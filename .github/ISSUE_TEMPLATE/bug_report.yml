name: Bug report
description: Report a reproducible software bug that does not primarily involve real robot hardware.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use the hardware issue template if the bug involves unexpected robot motion, FCI connection failures, gripper hardware, or real robot safety.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact command and minimal inputs.
      placeholder: |
        1. Run `...`
        2. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: text
  - type: input
    id: version
    attributes:
      label: Franka Control version or commit
      placeholder: v0.1.0 or commit SHA
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Ubuntu 22.04
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I included the exact command or code path.
          required: true
